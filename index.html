<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>法人カード（経費ログ）</title>
<style>
  :root{ --navy:#7A4E27; --navy2:#9A6634; --pink:#E58A99; --gold:#F0C038; --ink:#3a2e26;
    --line:#ece5dc; --muted:#7a6b5d; --bg:#faf6f0; --card:#fff; --yellow:#fdf3da; --yellow-br:#ecd79a;
    --ok:#0f7b4f; --ok-bg:#e8f6ee; --warn:#b3261e; }
  *{box-sizing:border-box;}
  body{margin:0;font-family:"Meiryo UI","Meiryo","Segoe UI",sans-serif;background:var(--bg);color:var(--ink);font-size:14px;}
  header{background:linear-gradient(135deg,#7A4E27,#E58A99);color:#fff;padding:14px 18px;border-bottom:3px solid var(--gold);}
  header .applogo{height:32px;width:auto;display:block;margin-bottom:8px;background:#fff;padding:5px 9px;border-radius:9px}
  header .ttl{font-size:17px;font-weight:800;}
  header .sub{font-size:11.5px;opacity:.9;margin-top:2px;}
  main{padding:16px;}
  .page{max-width:1000px;margin:0 auto;}
  @media(max-width:1040px){ .page{max-width:100%;} }
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:14px;box-shadow:0 1px 3px rgba(122,78,39,.06);}
  .card h3{font-size:13px;color:var(--navy);margin:0 0 12px;font-weight:800;display:flex;align-items:center;gap:7px;}
  .card h3 .n{width:22px;height:22px;border-radius:50%;background:var(--navy);color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:12px;}
  label.fld{display:block;margin-bottom:11px;}
  label.fld>span{display:block;font-size:11.5px;color:var(--muted);font-weight:700;margin-bottom:4px;}
  input,select{font-family:inherit;font-size:15px;border:1px solid var(--line);border-radius:9px;padding:11px 12px;width:100%;background:var(--yellow);border-color:var(--yellow-br);color:var(--ink);}
  input:focus,select:focus{outline:2px solid var(--gold);outline-offset:-1px;}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .btn{background:var(--navy);color:#fff;border:none;border-radius:10px;padding:13px 16px;font-size:15px;font-weight:800;cursor:pointer;font-family:inherit;width:100%;}
  .btn:hover{background:var(--navy2);}
  .btn:disabled{opacity:.5;}
  .btn.o{background:#fff;color:var(--navy);border:1px solid var(--navy);}
  .btn.sm{padding:8px 12px;font-size:13px;width:auto;border-radius:8px;}
  .seg{display:flex;gap:6px;background:#f3ece1;border-radius:12px;padding:5px;margin-bottom:14px;max-width:1000px;margin-left:auto;margin-right:auto;}
  .seg button{flex:1;border:none;background:none;padding:11px;border-radius:9px;font-size:14px;font-weight:800;color:var(--muted);cursor:pointer;font-family:inherit;}
  .seg button.on{background:#fff;color:var(--navy);box-shadow:0 1px 3px rgba(122,78,39,.14);}
  .capwrap{border:2px dashed var(--line);border-radius:14px;padding:22px;text-align:center;background:#fbf7f0;}
  .capwrap.has{border-style:solid;border-color:var(--gold);padding:10px;}
  .preview{max-width:100%;max-height:320px;border-radius:10px;display:block;margin:0 auto;}
  .filebtns{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:10px;}
  .spinner{width:16px;height:16px;border:2px solid var(--navy);border-top-color:transparent;border-radius:50%;animation:spin .8s linear infinite;display:inline-block;vertical-align:-3px;margin-right:6px;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .status{font-size:12.5px;font-weight:700;margin-top:10px;}
  .status.ok{color:var(--ok);} .status.err{color:var(--warn);}
  .pill{font-size:10.5px;font-weight:800;border-radius:20px;padding:2px 9px;background:#fdf1cf;color:#8a6d1e;}
  .done{text-align:center;padding:26px 14px;}
  .done .big{font-size:46px;}
  .done h2{color:var(--ok);font-size:20px;margin:8px 0 4px;}
  .done p{color:var(--muted);font-size:13px;margin:0 0 18px;}
  .hide{display:none;}
  .mini{font-size:11px;color:var(--muted);}
  .cfgwarn{background:#fce9e7;border:1px solid #e6b8b3;color:#8a201a;border-radius:10px;padding:11px 13px;font-size:12.5px;margin-bottom:14px;}
  .page{display:none;} .page.on{display:block;}
  /* 経理ビュー */
  .lockwrap{max-width:360px;margin:30px auto;text-align:center;}
  .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:14px;}
  .kpi{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:13px;}
  .kpi .lbl{font-size:11px;color:var(--muted);font-weight:700;}
  .kpi .val{font-size:22px;font-weight:800;color:var(--navy);margin-top:3px;}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px;margin-bottom:14px;}
  .panel h3{font-size:13px;color:var(--navy);margin:0 0 10px;font-weight:800;display:flex;align-items:center;gap:7px;}
  .panel h3::before{content:"";width:4px;height:13px;background:var(--gold);border-radius:2px;}
  .acct-toolbar{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:14px;}
  .acct-toolbar select{font-size:13px;border:1px solid var(--line);border-radius:8px;padding:8px 10px;background:#fff;width:auto;}
  .acct-status{font-size:12px;color:var(--muted);} .acct-status.err{color:#b3261e;}
  .scroll{overflow-x:auto;}
  table{width:100%;border-collapse:collapse;font-size:12.5px;}
  th,td{padding:8px 10px;border-bottom:1px solid var(--line);text-align:left;white-space:nowrap;}
  th{color:var(--muted);font-weight:700;background:#faf7f2;position:sticky;top:0;}
  td.num,th.num{text-align:right;}
  .tag{font-size:10.5px;font-weight:800;border-radius:6px;padding:2px 7px;background:#f3ece1;color:var(--navy);}
  .rlink{color:var(--navy);text-decoration:none;font-weight:800;}
  .empty{color:var(--muted);text-align:center;padding:20px;font-size:13px;}
  .bar{height:10px;border-radius:5px;background:var(--navy);}
  .cardpick{display:flex;gap:8px;}
  .cardpick button{flex:1;border:1px solid var(--yellow-br);background:var(--yellow);color:var(--ink);
    border-radius:9px;padding:12px 8px;font-size:14px;font-weight:800;cursor:pointer;font-family:inherit;}
  .cardpick button.on{background:var(--navy);border-color:var(--navy);color:#fff;}
  .bdg{font-size:10.5px;font-weight:800;border-radius:20px;padding:3px 9px;white-space:nowrap;display:inline-block;}
  .bdg.un{background:#fdecea;color:var(--warn);}
  .bdg.ok{background:var(--ok-bg);color:var(--ok);}
  .chkbtn{border:1px solid var(--navy);background:#fff;color:var(--navy);border-radius:7px;
    padding:5px 9px;font-size:11.5px;font-weight:800;cursor:pointer;font-family:inherit;white-space:nowrap;}
  .chkbtn.undo{border-color:var(--line);color:var(--muted);}
  .chkbtn:disabled{opacity:.5;}
  .chkinfo{font-size:10px;color:var(--muted);margin-top:2px;white-space:nowrap;}
  .catrow{display:flex;align-items:center;gap:8px;margin-bottom:7px;font-size:12.5px;}
  .catrow .nm{width:96px;flex:0 0 auto;color:var(--ink);}
  .catrow .track{flex:1;background:#f3ece1;border-radius:5px;overflow:hidden;}
  .catrow .amt{width:82px;flex:0 0 auto;text-align:right;font-weight:800;color:var(--navy);}

  /* iOSのdate入力を他の入力と揃える（中央寄せ・拡大を防ぐ） */
  input[type="date"]{ -webkit-appearance:none; appearance:none; text-align:left; min-height:44px; line-height:1.2; }
  input[type="date"]::-webkit-date-and-time-value{ text-align:left; }
</style>
</head>

<script>
/* ====== 送信先（GASのウェブアプリ /exec URL） ====== */
const GAS_URL = "https://script.google.com/macros/s/AKfycbxfGJZaevY2hGH0CLAkMHpzecDA2HUQkcdv0o9ryAm6ShFyzvWLEbTvLdVSb3diagVZQA/exec";
const CATS = ["消耗品","食費","交通費","通信費","医療・衛生","接待・会議","修繕","備品","その他"];
const ACCT_PW = "9999";
/* ==================================================== */

let cats = CATS.slice();
let currentImage = null;
const LASTUSER = "serene_keihi_lastuser";
const LASTCARD = "serene_keihi_lastcard";

/* ===== カード区分 ===== */
let selectedCard = "";
function pickCard(c){
  selectedCard = c;
  s("card-smbc").classList.toggle("on", c==="三井住友");
  s("card-musashino").classList.toggle("on", c==="武蔵野");
  try{ localStorage.setItem(LASTCARD, c); }catch(_){}
}
function s(id){ return document.getElementById(id); }
function yen(n){ return "¥"+(Number(n)||0).toLocaleString(); }
function esc(t){ return String(t==null?"":t).replace(/[&<>"]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[m])); }

function gasPost(payload){
  return fetch(GAS_URL, { method:"POST", headers:{"Content-Type":"text/plain;charset=utf-8"}, body:JSON.stringify(payload) }).then(r=>r.json());
}

/* ===== ページ切替 ===== */
function showPage(p){
  s("seg-rec").classList.toggle("on", p==="rec");
  s("seg-acct").classList.toggle("on", p==="acct");
  s("page-rec").classList.toggle("on", p==="rec");
  s("page-acct").classList.toggle("on", p==="acct");
  window.scrollTo({top:0});
}

/* ===== 記録（撮って送る） ===== */
function onPick(ev){
  const f=ev.target.files&&ev.target.files[0]; ev.target.value=""; if(!f) return;
  const rd=new FileReader();
  rd.onload=()=>{ const img=new Image();
    img.onload=()=>{ const max=1400; let w=img.width,h=img.height;
      if(Math.max(w,h)>max){ const sc=max/Math.max(w,h); w=Math.round(w*sc); h=Math.round(h*sc); }
      const cv=document.createElement("canvas"); cv.width=w; cv.height=h;
      cv.getContext("2d").drawImage(img,0,0,w,h);
      currentImage=cv.toDataURL("image/jpeg",0.72);
      showPreview(); runOCR();
    };
    img.src=rd.result;
  };
  rd.readAsDataURL(f);
}
function showPreview(){ const p=s("preview");
  if(currentImage){ p.src=currentImage; p.style.display="block"; s("capEmpty").style.display="none"; s("capwrap").classList.add("has"); s("retake").style.display="flex"; }
  else { p.style.display="none"; s("capEmpty").style.display="block"; s("capwrap").classList.remove("has"); s("retake").style.display="none"; s("aiArea").classList.add("hide"); }
}
async function runOCR(){
  if(!currentImage) return; if(!GAS_URL){ return; }
  const st=s("aiStatus"); s("aiArea").classList.remove("hide");
  st.className="status"; st.innerHTML='<span class="spinner"></span>領収書を読み取っています…';
  try{
    const r = await gasPost({ action:"ocr", image:currentImage });
    if(!r.ok) throw new Error(r.error||"読み取り失敗");
    const o=r.fields||{};
    if(o.date) s("f-date").value=o.date;
    if(o.store) s("f-store").value=o.store;
    if(o.amount) s("f-amount").value=Math.round(Number(o.amount))||"";
    if(o.category){ ensureCat(o.category); s("f-category").value=o.category; s("catAI").style.display="inline-block"; }
    if(o.memo) s("f-memo").value=o.memo;
    st.className="status ok"; st.textContent="✓ 読み取りました。内容を確認して送ってください。";
  }catch(e){ st.className="status err"; st.textContent="自動読み取りできませんでした。手で入力して送ってください。（"+e.message+"）"; }
}
function ensureCat(c){ if(c&&!cats.includes(c)){ cats.push(c); fillCats(); } }
function fillCats(){ s("f-category").innerHTML=cats.map(c=>`<option>${c}</option>`).join(""); }
async function send(){
  const amount=Number(s("f-amount").value)||0, date=s("f-date").value;
  if(!currentImage){ s("sendErr").textContent="先に領収書を撮ってください。"; return; }
  if(!date){ s("sendErr").textContent="日付を入れてください。"; return; }
  if(!amount){ s("sendErr").textContent="金額を入れてください。"; return; }
  if(!selectedCard){ s("sendErr").textContent="使ったカード（三井住友／武蔵野）を選んでください。"; return; }
  s("sendErr").textContent="";
  const btn=s("sendBtn"); btn.disabled=true; btn.innerHTML='<span class="spinner"></span>送信中…';
  try{
    const user=s("f-user").value.trim();
    const r = await gasPost({ action:"save", date, amount, store:s("f-store").value.trim(),
      category:s("f-category").value, user, memo:s("f-memo").value.trim(), card:selectedCard,
      image:currentImage, device:navigator.userAgent.slice(0,60) });
    if(!r.ok) throw new Error(r.error||"送信失敗");
    try{ if(user && !window._loginName) localStorage.setItem(LASTUSER,user); }catch(_){}
    s("flow").classList.add("hide"); s("done").classList.remove("hide"); window.scrollTo({top:0});
  }catch(e){ s("sendErr").textContent="送信できませんでした："+e.message; }
  finally{ btn.disabled=false; btn.innerHTML="📤 この領収書を送る"; }
}
function nextOne(){
  currentImage=null; showPreview();
  s("f-date").value=new Date().toISOString().slice(0,10);
  s("f-amount").value=""; s("f-store").value=""; s("f-memo").value="";
  s("f-category").selectedIndex=0; s("catAI").style.display="none"; s("aiStatus").textContent="";
  s("done").classList.add("hide"); s("flow").classList.remove("hide");
}

/* ===== 経理ビュー ===== */
let acctRows=[], acctLoaded=false, acctUnlocked=false;
function unlockAcct(){
  const pw=s("acct-pw").value;
  if(pw!==ACCT_PW){ s("acct-pw-err").textContent="パスワードが違います"; return; }
  acctUnlocked=true; s("acct-lock").classList.add("hide"); s("acct-body").classList.remove("hide");
  if(!acctLoaded) acctReload();
}
async function acctReload(){
  const st=s("acct-status"); st.className="acct-status"; st.textContent="読み込み中…";
  try{
    const r=await gasPost({action:"list"});
    if(!r.ok) throw new Error(r.error||"取得失敗");
    acctRows=(r.rows||[]).map(x=>({...x, mk:(String(x.date||x.received||"")).slice(0,7)}));
    acctLoaded=true;
    // 月プルダウン
    const months=[...new Set(acctRows.map(r=>r.mk).filter(Boolean))].sort().reverse();
    s("acct-month").innerHTML='<option value="">すべての期間</option>'+months.map(m=>`<option value="${m}">${m}</option>`).join("");
    st.textContent="全"+acctRows.length+"件";
    acctRender();
  }catch(e){ st.className="acct-status err"; st.textContent="エラー："+e.message; }
}
function acctFiltered(){
  const mk=s("acct-month").value, cd=s("acct-card").value, ck=s("acct-chk").value;
  let list=mk?acctRows.filter(r=>r.mk===mk):acctRows.slice();
  if(cd==="__none__") list=list.filter(r=>!r.card);
  else if(cd) list=list.filter(r=>r.card===cd);
  if(ck==="un") list=list.filter(r=>!r.checked);
  if(ck==="ok") list=list.filter(r=>r.checked);
  return list;
}
function acctRender(){
  const list=acctFiltered();
  // KPI
  const total=list.reduce((a,r)=>a+(r.amount||0),0);
  const cnt=list.length;
  const users=[...new Set(list.map(r=>r.user).filter(Boolean))].length;
  const unchecked=list.filter(r=>!r.checked).length;
  s("kpis").innerHTML=[
    ["支払合計", yen(total)],
    ["件数", cnt+"件"],
    ["利用者数", users+"人"],
    ["未確認", unchecked+"件"]
  ].map(([l,v])=>`<div class="kpi"><div class="lbl">${l}</div><div class="val">${v}</div></div>`).join("");
  acctCard(list); acctCat(list); acctList(list);
}
function acctCard(list){
  const map={}; list.forEach(r=>{ const c=r.card||"（未選択）"; map[c]=(map[c]||0)+r.amount; });
  const es=Object.entries(map).sort((a,b)=>b[1]-a[1]);
  if(!es.length){ s("cardbreak").innerHTML='<div class="empty">明細がありません</div>'; return; }
  const mx=Math.max(...es.map(e=>e[1]),1);
  s("cardbreak").innerHTML=es.map(([c,v])=>`<div class="catrow"><span class="nm">${esc(c)}</span><span class="track"><span class="bar" style="width:${Math.round(v/mx*100)}%"></span></span><span class="amt">${yen(v)}</span></div>`).join("");
}
function acctCat(list){
  const map={}; list.forEach(r=>{ const c=r.category||"未分類"; map[c]=(map[c]||0)+r.amount; });
  const es=Object.entries(map).sort((a,b)=>b[1]-a[1]);
  if(!es.length){ s("catbreak").innerHTML='<div class="empty">明細がありません</div>'; return; }
  const mx=Math.max(...es.map(e=>e[1]),1);
  s("catbreak").innerHTML=es.map(([c,v])=>`<div class="catrow"><span class="nm">${esc(c)}</span><span class="track"><span class="bar" style="width:${Math.round(v/mx*100)}%"></span></span><span class="amt">${yen(v)}</span></div>`).join("");
}
function acctList(list){
  if(!list.length){ s("listWrap").innerHTML='<div class="empty">明細がありません</div>'; return; }
  const sorted=list.slice().sort((a,b)=>String(b.date).localeCompare(String(a.date)));
  let h='<table><thead><tr><th>日付</th><th class="num">金額</th><th>カード</th><th>費目</th><th>利用先</th><th>利用者</th><th>メモ</th><th>領収書</th><th>確認</th></tr></thead><tbody>';
  sorted.forEach(r=>{
    const chk = r.checked
      ? `<span class="bdg ok">✓ 確認済</span><div class="chkinfo">${esc(r.checkedBy)}${r.checkedAt?" "+esc(r.checkedAt):""}</div><button class="chkbtn undo" onclick="toggleCheck('${esc(r.id)}',false,this)">取り消す</button>`
      : `<span class="bdg un">未確認</span> <button class="chkbtn" onclick="toggleCheck('${esc(r.id)}',true,this)">確認する</button>`;
    h+=`<tr><td>${esc((r.date||"").toString().slice(0,10))}</td><td class="num">${yen(r.amount)}</td><td><span class="tag">${esc(r.card)||'—'}</span></td><td><span class="tag">${esc(r.category)||'—'}</span></td><td>${esc(r.store)||'—'}</td><td>${esc(r.user)||'—'}</td><td>${esc(r.memo)||''}</td><td>${r.url?`<a class="rlink" href="${r.url}" target="_blank" rel="noopener">📷</a>`:'—'}</td><td>${r.id?chk:'<span class="mini">ID未付与（↻更新）</span>'}</td></tr>`;
  });
  s("listWrap").innerHTML=h+"</tbody></table>";
}
async function toggleCheck(id, checked, btn){
  if(!id) return;
  const by = window._loginName || "経理";
  if(btn) btn.disabled=true;
  try{
    const r = await gasPost({ action:"setChecked", id, checked, by });
    if(!r.ok) throw new Error(r.error||"更新失敗");
    const row = acctRows.find(x=>x.id===id);
    if(row){ row.checked=r.checked; row.checkedBy=r.checkedBy||""; row.checkedAt=r.checkedAt||""; }
    acctRender();
  }catch(e){
    if(btn) btn.disabled=false;
    alert("確認状態を更新できませんでした：\n"+e.message);
  }
}
function exportCSV(){
  const mk=s("acct-month").value;
  const list=acctFiltered().sort((a,b)=>String(b.date).localeCompare(String(a.date)));
  const head=["日付","金額","カード","費目","利用先","利用者","メモ","領収書リンク","確認状態","確認者","確認日時"];
  const q=v=>'"'+String(v==null?"":v).replace(/"/g,'""')+'"';
  const csv="\uFEFF"+head.join(",")+"\n"+list.map(r=>[(r.date||"").toString().slice(0,10),r.amount,r.card,r.category,r.store,r.user,r.memo,r.url,(r.checked?"確認済":"未確認"),r.checkedBy,r.checkedAt].map(q).join(",")).join("\n");
  const a=document.createElement("a"); a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv"})); a.download="法人カード明細"+(mk?"_"+mk:"")+".csv"; a.click();
}

/* 起動 */
(function(){
  fillCats(); nextOne();
  // ログイン名の自動取得：①?rec= → ②ポータルのログイン情報
  var loginName="";
  try{ loginName=new URLSearchParams(location.search).get('rec')||""; }catch(_){}
  if(!loginName){ try{ var pa=JSON.parse(sessionStorage.getItem('portalAuth')||'null'); if(pa&&pa.name) loginName=pa.name; }catch(_){}
    if(!loginName){ try{ var pa2=localStorage.getItem('portalAuth'); if(pa2){ var o=JSON.parse(pa2); if(o&&o.name) loginName=o.name; } }catch(_){} } }
  if(loginName){ s("f-user").value=loginName; s("f-user").readOnly=true; s("f-user").style.background="#f3ece1"; s("userLbl").textContent="記録者（ログイン中）"; window._loginName=loginName; }
  else { try{ const lu=localStorage.getItem(LASTUSER); if(lu) s("f-user").value=lu; }catch(_){} }
  // 前回選んだカードを復元（同じカードを続けて使うことが多いため）
  try{ const lc=localStorage.getItem(LASTCARD); if(lc==="三井住友"||lc==="武蔵野") pickCard(lc); }catch(_){}
  if(!GAS_URL) s("cfgwarn").classList.remove("hide");
})();
</script>
